<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 音乐二维码工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6c63ff; --primary-dark: #5a52d5;
      --bg: #0f0f1a; --card: #1a1a2e; --card2: #16213e;
      --text: #e8e8f0; --muted: #8888aa; --border: #2a2a4a;
      --success: #4ade80; --error: #f87171;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header { background: linear-gradient(135deg,#1a1a2e,#16213e); border-bottom: 1px solid var(--border); padding: 18px 28px; display: flex; align-items: center; gap: 14px; }
    header .logo { font-size: 30px; }
    header h1 { font-size: 20px; font-weight: 700; }
    header p { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 768px) { .container { grid-template-columns: 1fr; padding: 16px; } }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
    .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 18px; }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
    input[type="text"], textarea { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; color: var(--text); font-size: 14px; outline: none; transition: border-color .2s; font-family: inherit; }
    input[type="text"]:focus, textarea:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 140px; line-height: 1.6; }

    .color-row { display: flex; gap: 9px; flex-wrap: wrap; }
    .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform .15s, border-color .15s; }
    .color-dot:hover { transform: scale(1.15); }
    .color-dot.active { border-color: white; transform: scale(1.15); }

    .upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 28px 16px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; position: relative; }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--primary); background: rgba(108,99,255,.05); }
    .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-zone .icon { font-size: 36px; margin-bottom: 8px; }
    .upload-zone .hint { font-size: 12px; color: var(--muted); }
    .upload-zone .file-name { margin-top: 8px; font-size: 13px; color: var(--success); font-weight: 500; }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 12px 24px; border-radius: 11px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; width: 100%; }
    .btn-primary { background: linear-gradient(135deg,var(--primary),var(--primary-dark)); color: white; }
    .btn-primary:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }

    .progress-wrap { display: none; margin-top: 14px; }
    .progress-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg,var(--primary),#a78bfa); border-radius: 3px; width: 0%; transition: width .3s; }
    .progress-text { font-size: 12px; color: var(--muted); margin-top: 5px; text-align: center; }

    .song-list { display: flex; flex-direction: column; gap: 10px; }
    .song-item { background: var(--card2); border: 1px solid var(--border); border-radius: 11px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; transition: border-color .2s; }
    .song-item:hover { border-color: var(--primary); }
    .song-cover { width: 42px; height: 42px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .song-info { flex: 1; min-width: 0; }
    .song-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-artist { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .song-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn { width: 32px; height: 32px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all .2s; text-decoration: none; }
    .icon-btn:hover { border-color: var(--primary); color: var(--primary); background: rgba(108,99,255,.1); }
    .icon-btn.del:hover { border-color: var(--error); color: var(--error); background: rgba(248,113,113,.1); }

    .empty-state { text-align: center; padding: 36px 16px; color: var(--muted); }
    .empty-state .icon { font-size: 44px; margin-bottom: 10px; }
    .tip { font-size: 12px; color: var(--muted); margin-top: 5px; line-height: 1.5; }
    .tip code { background: var(--card2); padding: 1px 5px; border-radius: 4px; font-family: monospace; color: #a78bfa; }

    /* 二维码弹窗 */
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.75); backdrop-filter: blur(4px); align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px 36px; text-align: center; max-width: 400px; width: 100%; position: relative; }
    .modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }
    .modal-close:hover { color: var(--text); }
    .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .modal .sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

    .qr-wrap { position: relative; display: inline-block; margin-bottom: 18px; }
    #qrCanvas { border-radius: 50%; box-shadow: 0 0 0 8px rgba(108,99,255,.12), 0 0 0 16px rgba(108,99,255,.06), 0 16px 40px rgba(0,0,0,.4); display: block; }
    .qr-ring { position: absolute; inset: -10px; border-radius: 50%; border: 2px solid rgba(108,99,255,.35); animation: pulse 2.5s ease-out infinite; }
    .qr-ring:nth-child(2) { animation-delay: .8s; }
    .qr-ring:nth-child(3) { animation-delay: 1.6s; }
    @keyframes pulse { 0%{transform:scale(1);opacity:.6} 100%{transform:scale(1.22);opacity:0} }

    .perm-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.3); color: var(--success); margin-bottom: 16px; }
    .perm-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
    .modal-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; text-decoration: none; transition: all .2s; }
    .modal-btn-primary { background: linear-gradient(135deg,var(--primary),var(--primary-dark)); color: white; }
    .modal-btn-primary:hover { opacity: .9; }
    .modal-btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .modal-btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    .url-box { margin-top: 14px; background: var(--card2); border: 1px solid var(--border); border-radius: 9px; padding: 9px 12px; display: flex; align-items: center; gap: 8px; }
    .url-text { flex: 1; font-size: 11px; color: var(--muted); word-break: break-all; text-align: left; font-family: monospace; }
    .copy-btn { flex-shrink: 0; background: var(--border); border: none; color: var(--text); padding: 4px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; transition: background .2s; }
    .copy-btn:hover { background: var(--primary); }

    #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--card); border: 1px solid var(--border); border-radius: 11px; padding: 12px 22px; font-size: 13px; opacity: 0; transition: all .3s; z-index: 9999; pointer-events: none; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error   { border-color: var(--error);   color: var(--error); }

    .skeleton { background: linear-gradient(90deg,var(--card2) 25%,var(--border) 50%,var(--card2) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; height: 62px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>

<header>
  <div class="logo">🎵</div>
  <div>
    <h1>音乐二维码工具</h1>
    <p>上传音乐 → 生成永久二维码 → 任何人扫码播放</p>
  </div>
</header>

<div class="container">
  <div class="card">
    <h2>📤 上传新歌曲</h2>

    <div class="form-group">
      <label>音频文件 *</label>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="audioFile" accept=".mp3,.m4a,.ogg,.wav,.flac,.aac">
        <div class="icon">🎧</div>
        <div>点击或拖拽上传音频文件</div>
        <div class="hint">支持 MP3 / M4A / OGG / WAV / FLAC / AAC</div>
        <div class="file-name" id="fileName"></div>
      </div>
    </div>

    <div class="form-group">
      <label>歌名 *</label>
      <input type="text" id="title" placeholder="输入歌曲名称">
    </div>

    <div class="form-group">
      <label>歌手</label>
      <input type="text" id="artist" placeholder="输入歌手名（可选）">
    </div>

    <div class="form-group">
      <label>封面颜色</label>
      <div class="color-row" id="colorRow">
        <div class="color-dot active" style="background:#6c63ff" data-color="#6c63ff"></div>
        <div class="color-dot" style="background:#f43f5e" data-color="#f43f5e"></div>
        <div class="color-dot" style="background:#f97316" data-color="#f97316"></div>
        <div class="color-dot" style="background:#eab308" data-color="#eab308"></div>
        <div class="color-dot" style="background:#22c55e" data-color="#22c55e"></div>
        <div class="color-dot" style="background:#06b6d4" data-color="#06b6d4"></div>
        <div class="color-dot" style="background:#ec4899" data-color="#ec4899"></div>
        <div class="color-dot" style="background:#8b5cf6" data-color="#8b5cf6"></div>
      </div>
    </div>

    <div class="form-group">
      <label>歌词</label>
      <textarea id="lyrics" placeholder="粘贴歌词...

支持 LRC 格式（带时间戳自动同步）：
[00:12.34] 第一行歌词
[00:16.00] 第二行歌词

也支持纯文本歌词（按进度均匀滚动）"></textarea>
      <div class="tip">推荐 LRC 格式 <code>[mm:ss.xx]</code> 实现精准同步，也可直接粘贴纯文本。</div>
    </div>

    <button class="btn btn-primary" id="uploadBtn" onclick="uploadSong()">✨ 上传并生成二维码</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">准备中...</div>
    </div>
  </div>

  <div class="card">
    <h2>🎶 已上传歌曲</h2>
    <div class="song-list" id="songList">
      <div class="skeleton"></div>
      <div class="skeleton" style="height:62px;margin-top:10px;opacity:.6"></div>
    </div>
  </div>
</div>

<!-- 二维码弹窗 -->
<div class="modal-overlay" id="qrModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="perm-badge"><span class="perm-dot"></span>永久有效 · GitHub Pages</div>
    <h3 id="modalTitle">—</h3>
    <div class="sub" id="modalArtist">—</div>
    <div class="qr-wrap">
      <div class="qr-ring"></div><div class="qr-ring"></div><div class="qr-ring"></div>
      <canvas id="qrCanvas" width="240" height="240"></canvas>
    </div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px">📱 扫描二维码，任何网络均可播放</div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-primary" onclick="downloadQR()">⬇️ 下载二维码</button>
      <a class="modal-btn modal-btn-outline" id="previewLink" target="_blank">▶️ 预览</a>
    </div>
    <div class="url-box">
      <div class="url-text" id="modalUrl"></div>
      <button class="copy-btn" onclick="copyModalUrl()">复制</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
const PAGES_BASE = 'https://lixiang120500-dotcom.github.io/music-qr';
const playerUrl  = id => `${PAGES_BASE}/player/?id=${id}`;
let selectedColor = '#6c63ff';
let currentSongId = null;
let currentSongTitle = '';

// ── 圆形二维码（Canvas）──────────────────────────────────────
async function drawRoundQR(url, canvas) {
  const SIZE = 240;
  canvas.width = canvas.height = SIZE;
  const ctx = canvas.getContext('2d');
  const off = document.createElement('canvas');
  await QRCode.toCanvas(off, url, { width: SIZE, margin: 1, errorCorrectionLevel: 'H', color: { dark: '#000000', light: '#ffffff' } });
  const inner  = Math.floor(SIZE / 1.42 * 0.88);
  const offset = Math.floor((SIZE - inner) / 2);
  ctx.clearRect(0, 0, SIZE, SIZE);
  ctx.save();
  ctx.beginPath();
  ctx.arc(SIZE/2, SIZE/2, SIZE/2, 0, Math.PI*2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.clip();
  ctx.drawImage(off, offset, offset, inner, inner);
  ctx.restore();
}

// ── 上传 ─────────────────────────────────────────────────────
async function uploadSong() {
  const file   = document.getElementById('audioFile').files[0];
  const title  = document.getElementById('title').value.trim();
  const artist = document.getElementById('artist').value.trim();
  const lyrics = document.getElementById('lyrics').value.trim();

  if (!file)  return showToast('请选择音频文件', 'error');
  if (!title) return showToast('请输入歌名', 'error');

  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 上传中...';
  showProgress(true, '上传中...', 10);

  try {
    const fd = new FormData();
    fd.append('audio', file);
    fd.append('title', title);
    fd.append('artist', artist);
    fd.append('lyrics', lyrics);
    fd.append('cover_color', selectedColor);

    // 用 XMLHttpRequest 显示进度
    const result = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/upload');
      xhr.upload.onprogress = e => {
        if (e.lengthComputable) {
          const pct = Math.round(e.loaded / e.total * 90);
          showProgress(true, `上传文件 ${pct}%...`, pct);
        }
      };
      xhr.onload = () => {
        if (xhr.status === 200) resolve(JSON.parse(xhr.responseText));
        else reject(new Error(JSON.parse(xhr.responseText).error || '上传失败'));
      };
      xhr.onerror = () => reject(new Error('网络错误，请检查网络连接'));
      xhr.send(fd);
    });

    showProgress(true, '✅ 上传成功！', 100);
    showToast('🎉 上传成功！', 'success');

    // 重置表单
    document.getElementById('audioFile').value = '';
    document.getElementById('fileName').textContent = '';
    document.getElementById('title').value = '';
    document.getElementById('artist').value = '';
    document.getElementById('lyrics').value = '';

    setTimeout(() => {
      showProgress(false);
      openQRModal(result.song_id, result.title, artist);
      loadSongs();
    }, 600);

  } catch(e) {
    showToast('上传失败：' + e.message, 'error');
    showProgress(false);
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ 上传并生成二维码';
  }
}

// ── 二维码弹窗 ───────────────────────────────────────────────
async function openQRModal(songId, title, artist) {
  currentSongId    = songId;
  currentSongTitle = title;
  const url = playerUrl(songId);

  document.getElementById('modalTitle').textContent  = title;
  document.getElementById('modalArtist').textContent = artist || '未知歌手';
  document.getElementById('modalUrl').textContent    = url;
  document.getElementById('previewLink').href        = url;

  await drawRoundQR(url, document.getElementById('qrCanvas'));
  document.getElementById('qrModal').classList.add('show');
}

function closeModal() { document.getElementById('qrModal').classList.remove('show'); }

function downloadQR() {
  const link = document.createElement('a');
  link.download = `qr_${currentSongTitle || 'music'}.png`;
  link.href = document.getElementById('qrCanvas').toDataURL('image/png');
  link.click();
}

function copyModalUrl() {
  const url = document.getElementById('modalUrl').textContent;
  navigator.clipboard?.writeText(url).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });
  showToast('✓ 链接已复制', 'success');
}

// ── 歌曲列表 ─────────────────────────────────────────────────
async function loadSongs() {
  const list = document.getElementById('songList');
  try {
    const res  = await fetch('/api/songs');
    const songs = await res.json();
    if (!Array.isArray(songs) || !songs.length) {
      list.innerHTML = `<div class="empty-state"><div class="icon">🎵</div><div>暂无歌曲，快去上传吧！</div></div>`;
      return;
    }
    list.innerHTML = songs.map(s => `
      <div class="song-item" id="song-${s.id}">
        <div class="song-cover" style="background:linear-gradient(135deg,${esc(s.cover_color||'#6c63ff')},#1a1a2e)">🎵</div>
        <div class="song-info">
          <div class="song-title">${esc(s.title)}</div>
          <div class="song-artist">${esc(s.artist||'未知歌手')}</div>
        </div>
        <div class="song-actions">
          <button class="icon-btn" title="查看二维码" onclick='showQR(${JSON.stringify(s)})'>📱</button>
          <a class="icon-btn" title="播放" href="${playerUrl(s.id)}" target="_blank">▶️</a>
          <button class="icon-btn del" title="删除" onclick="deleteSong('${s.id}','${esc(s.title)}')">🗑️</button>
        </div>
      </div>`).join('');
  } catch(e) {
    list.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><div>加载失败：${esc(e.message)}</div></div>`;
  }
}

async function showQR(song) {
  await openQRModal(song.id, song.title, song.artist || '');
}

async function deleteSong(id, title) {
  if (!confirm(`确定删除「${title}」吗？此操作不可撤销。`)) return;
  try {
    const res = await fetch(`/api/songs?id=${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (res.ok) { showToast('已删除', 'success'); loadSongs(); }
    else showToast(data.error || '删除失败', 'error');
  } catch(e) { showToast('删除失败：' + e.message, 'error'); }
}

// ── 工具 ─────────────────────────────────────────────────────
function showProgress(show, text='', pct=0) {
  document.getElementById('progressWrap').style.display = show ? 'block' : 'none';
  if (show) {
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = text;
  }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  clearTimeout(t._t); t._t = setTimeout(() => t.className = '', 3500);
}

// ── 事件绑定 ─────────────────────────────────────────────────
document.getElementById('colorRow').addEventListener('click', e => {
  const dot = e.target.closest('.color-dot');
  if (!dot) return;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  dot.classList.add('active');
  selectedColor = dot.dataset.color;
});

document.getElementById('audioFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('fileName').textContent = '✓ ' + file.name;
  if (!document.getElementById('title').value)
    document.getElementById('title').value = file.name.replace(/\.[^.]+$/, '');
});

const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const dt = new DataTransfer(); dt.items.add(file);
  document.getElementById('audioFile').files = dt.files;
  document.getElementById('fileName').textContent = '✓ ' + file.name;
  if (!document.getElementById('title').value)
    document.getElementById('title').value = file.name.replace(/\.[^.]+$/, '');
});

document.getElementById('qrModal').addEventListener('click', e => {
  if (e.target === document.getElementById('qrModal')) closeModal();
});

loadSongs();
</script>
</body>
</html>
